<!-- Standard HTML5 document declaration -->
<!DOCTYPE html>
<!-- Root HTML element with English language -->
<html lang="en">
<!-- Document head with metadata -->
<head>
    <!-- UTF-8 character encoding for special characters -->
    <meta charset="UTF-8">
    <!-- Responsive viewport for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title in browser tab -->
    <title>Battery Practice Exam</title>
    <!-- CSS styles for layout and appearance -->
    <style>
        /* Center content, limit width, clean font */
        body { font-family: Arial; max-width: 400px; margin: 20px auto; }
        /* Spacing and padding for inputs/buttons */
        input, button { margin: 5px; padding: 8px; }
        /* Red bold styling for warnings */
        .warning { color: red; font-weight: bold; }
        /* Space below output section */
        .output { margin-top: 20px; }
    </style>
</head>
<!-- Visible page content starts here -->
<body>
    <!-- Main heading -->
    <h2>Battery Simulator</h2>
    
    <!-- Battery creation inputs -->
    <div>
        <!-- Label + input for max capacity (defaults to 1000 mAh) -->
        <label>Max Capacity (mAh): <input id="maxCap" type="number" value="1000"></label>
        <!-- Label + input for initial charge (defaults to 500 mAh) -->
        <label>Initial Charge (mAh): <input id="initCharge" type="number" value="500"></label>
        <!-- Button calls createBattery() function when clicked -->
        <button onclick="createBattery()">Create Battery</button>
    </div>
    
    <!-- Charging/discharging controls -->
    <div>
        <!-- Seconds input for charging duration -->
        <label>Charge Seconds: <input id="seconds" type="number" value="10"></label>
        <!-- Calls doCharge() to charge battery -->
        <button onclick="doCharge()">Charge</button>
        <!-- Calls discharge100() to remove 100 mAh -->
        <button onclick="discharge100()">Discharge 100 mAh</button>
    </div>
    
    <!-- Live battery status display -->
    <div class="output">
        <!-- Shows current mAh level -->
        <p>Current Level: <span id="levelDisplay">-</span> mAh</p>
        <!-- Shows percentage (0-100%) -->
        <p>Percentage: <span id="percentDisplay">-</span>%</p>
        <!-- Warning messages appear here -->
        <p id="warning"></p>
    </div>

    <!-- Loads compiled JavaScript (created by: tsc battery.ts) -->
    <script src="battery.js"></script>
</body>
</html>
